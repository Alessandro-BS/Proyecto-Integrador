spring.application.name=sisol-reservas

# Servidor
server.port=8080

# === Base de Datos (MySQL) ===
spring.datasource.url=jdbc:mysql://localhost:3306/sisol_reservas?serverTimezone=America/Lima&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Inicialización de Datos (data.sql) después de que Hibernate crea las tablas
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# === Thymeleaf ===
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
