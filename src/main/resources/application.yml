# ============================================================
# SISOL SALUD - Configuración Principal
# ============================================================

spring:
  application:
    name: sisol-salud

  # ---- Inicialización de SQL ----
  sql:
    init:
      mode: always

  # ---- Base de Datos MySQL ----
  datasource:
    url: jdbc:mysql://localhost:3306/sisol_salud_db?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ---- JPA / Hibernate ----
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # ---- Thymeleaf ----
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8

  # ---- Email (SMTP) ----
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:tu-email@gmail.com}
    password: ${MAIL_PASSWORD:tu-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  # ---- DevTools ----
  devtools:
    restart:
      enabled: true

# ---- Seguridad JWT ----
app:
  jwt:
    secret: ${JWT_SECRET:MiClaveSecretaSuperSeguraParaSisolSaludQueDebeSerMuyLargaParaHS512AlMenos64Bytes!}
    expiration-ms: 86400000  # 24 horas

# ---- Notificaciones ----
  mail:
    from: ${MAIL_FROM:noreply@sisolsalud.pe}
    nombre-sistema: SISOL Salud

# ---- Servidor ----
server:
  port: 8080
  servlet:
    context-path: /

# ---- Actuator ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ---- Swagger / OpenAPI ----
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# ---- Logging ----
logging:
  level:
    com.sisol.salud: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG


